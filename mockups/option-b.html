<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Zulu Tennis — Option B</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--hl:#ffd400}
  body{background:#0b0b0b;color:#f1f1ec;font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:max(40px,env(safe-area-inset-top)) 24px max(28px,env(safe-area-inset-bottom));text-align:center}
  .crest{width:58px;height:80px;margin-bottom:14px}
  h1{font-family:"Didot","Bodoni 72","Hoefler Text",Georgia,serif;font-weight:600;font-size:2.6rem}
  .by{color:var(--hl);font-style:italic;font-size:1rem;margin:2px 0 28px}
  .cta{display:flex;flex-direction:column;gap:3px;align-items:center;width:100%;max-width:380px;
    background:var(--hl);color:#141414;text-decoration:none;padding:22px;border-radius:18px;
    box-shadow:0 12px 34px rgba(255,212,0,.22)}
  .cta .big{font-weight:850;font-size:1.5rem}
  .cta .sub{font-weight:700;font-size:.85rem;opacity:.75}
  .or{color:#6c6c66;font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;margin:24px 0 12px}
  .links{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:380px}
  .links a{flex:1 1 auto;border:1.5px solid #2a2a27;border-radius:999px;padding:11px 8px;color:#f1f1ec;
    text-decoration:none;font-weight:700;font-size:.9rem;min-width:104px}
  .hint{color:#6c6c66;font-size:.78rem;margin-top:30px}
</style></head>
<body>
  <svg class="crest" viewBox="0 0 100 138" aria-hidden="true">
    <ellipse cx="50" cy="69" rx="33" ry="58" fill="none" stroke="#ffd400" stroke-width="3"/>
    <line x1="50" y1="14" x2="50" y2="124" stroke="#ffd400" stroke-width="2.5"/>
    <line x1="30" y1="40" x2="70" y2="98" stroke="#ffd400" stroke-width="2.5"/>
    <line x1="70" y1="40" x2="30" y2="98" stroke="#ffd400" stroke-width="2.5"/>
    <circle cx="30" cy="40" r="9" fill="none" stroke="#ffd400" stroke-width="2.5"/>
    <circle cx="70" cy="40" r="9" fill="none" stroke="#ffd400" stroke-width="2.5"/>
  </svg>
  <h1>Zulu Tennis</h1>
  <div class="by">by Veyane</div>

  <a class="cta" href="#">
    <span class="big">🎾 Playing now?</span>
    <span class="sub">Open the Set-Break planner</span>
  </a>

  <div class="or">or explore</div>
  <div class="links">
    <a href="#">🃏 Deck</a>
    <a href="#">🎥 Watch</a>
    <a href="#">📖 Learn</a>
    <a href="#">📚 System</a>
  </div>

  <p class="hint">no sign-up · nothing tracked</p>
</body></html>
