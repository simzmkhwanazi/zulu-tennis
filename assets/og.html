<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  html,body{margin:0;padding:0;}
  .card{width:1200px;height:630px;background:#0b0b0b;color:#fff;position:relative;
    display:flex;flex-direction:row;align-items:center;justify-content:center;gap:64px;
    font-family:"Bodoni 72","Didot","Hoefler Text",Georgia,serif;overflow:hidden;}
  .crest{height:430px;width:auto;flex:0 0 auto;}
  .txt{display:flex;flex-direction:column;align-items:flex-start;}
  .zt{font-size:120px;font-weight:600;line-height:.95;color:#fff;letter-spacing:.01em;}
  .rule{width:360px;height:3px;background:#ffd400;margin:22px 0 16px;}
  .by{font-style:italic;color:#ffd400;font-size:40px;}
  .sub{font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#b9b9b2;letter-spacing:.2em;
    text-transform:uppercase;font-size:21px;font-weight:700;margin-top:26px;}
  .bar{position:absolute;bottom:0;left:0;right:0;height:10px;background:#ffd400;}
  .glow{position:absolute;width:900px;height:900px;border-radius:50%;top:-380px;right:-260px;
    background:radial-gradient(circle,rgba(255,212,0,.18),transparent 60%);}
</style></head>
<body>
  <div class="card">
    <div class="glow"></div>
    <img class="crest" src="logo.svg" alt="">
    <div class="txt">
      <div class="zt">Zulu Tennis</div>
      <div class="rule"></div>
      <div class="by">by Veyane</div>
      <div class="sub">Elite Singles Performance System</div>
    </div>
    <div class="bar"></div>
  </div>
</body></html>
