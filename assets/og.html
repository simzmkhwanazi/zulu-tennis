<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  html,body{margin:0;padding:0;}
  .card{width:1200px;height:630px;background:#0b0b0b;color:#fff;position:relative;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:"Bodoni 72","Didot","Hoefler Text",Georgia,serif;overflow:hidden;}
  .tag{font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#ffd400;letter-spacing:.4em;
    text-transform:uppercase;font-size:20px;font-weight:700;margin-bottom:18px;}
  .zt{font-size:140px;font-weight:600;line-height:1;color:#fff;letter-spacing:.01em;}
  .rule{width:520px;height:3px;background:#ffd400;margin:30px 0 24px;}
  .by{font-style:italic;color:#ffd400;font-size:46px;}
  .sub{font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#b9b9b2;letter-spacing:.22em;
    text-transform:uppercase;font-size:22px;font-weight:700;margin-top:30px;}
  .bar{position:absolute;bottom:0;left:0;right:0;height:10px;background:#ffd400;}
  .glow{position:absolute;width:900px;height:900px;border-radius:50%;top:-380px;right:-300px;
    background:radial-gradient(circle,rgba(255,212,0,.18),transparent 60%);}
</style></head>
<body>
  <div class="card">
    <div class="glow"></div>
    <div class="tag">By Veyane</div>
    <div class="zt">Zulu Tennis</div>
    <div class="rule"></div>
    <div class="by">by Veyane</div>
    <div class="sub">Elite Singles Performance System</div>
    <div class="bar"></div>
  </div>
</body></html>
