<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 276" fill="none">
  <defs>
    <g id="rk" stroke="#f6f6f2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <!-- handle (butt at 0,0, racket points UP = negative y) -->
      <line x1="0" y1="0" x2="0" y2="-50"/>
      <line x1="-4" y1="-8"  x2="4" y2="-10"/>
      <line x1="-4" y1="-16" x2="4" y2="-18"/>
      <line x1="-4" y1="-24" x2="4" y2="-26"/>
      <!-- throat -->
      <line x1="0" y1="-50" x2="-14" y2="-68"/>
      <line x1="0" y1="-50" x2="14" y2="-68"/>
      <!-- head -->
      <ellipse cx="0" cy="-98" rx="22" ry="29"/>
      <!-- strings -->
      <g stroke-width="1.1" opacity="0.9">
        <line x1="-12" y1="-74" x2="-12" y2="-122"/>
        <line x1="-4"  y1="-71" x2="-4"  y2="-125"/>
        <line x1="4"   y1="-71" x2="4"   y2="-125"/>
        <line x1="12"  y1="-74" x2="12"  y2="-122"/>
        <line x1="-20" y1="-86"  x2="20" y2="-86"/>
        <line x1="-22" y1="-98"  x2="22" y2="-98"/>
        <line x1="-20" y1="-110" x2="20" y2="-110"/>
      </g>
    </g>
  </defs>

  <!-- Zulu shield body (broad almond / isihlangu) -->
  <path d="M100,18 C150,30 168,82 168,138 C168,196 150,248 100,258 C50,248 32,196 32,138 C32,82 50,30 100,18 Z"
        fill="#0e0e0e" stroke="#ffd400" stroke-width="6"/>
  <path d="M100,31 C142,42 156,86 156,138 C156,190 142,234 100,244 C58,234 44,190 44,138 C44,86 58,42 100,31 Z"
        fill="none" stroke="#ffd400" stroke-width="1.6" opacity="0.65"/>

  <!-- Zulu stick: top & bottom stubs with knobs (not full-length, so rackets read clean) -->
  <line x1="100" y1="8" x2="100" y2="58" stroke="#ffd400" stroke-width="5" stroke-linecap="round"/>
  <line x1="100" y1="214" x2="100" y2="270" stroke="#ffd400" stroke-width="5" stroke-linecap="round"/>
  <circle cx="100" cy="9" r="5" fill="#ffd400"/>
  <circle cx="100" cy="269" r="5" fill="#ffd400"/>
  <!-- hide lacing across the stick (top & bottom) -->
  <g stroke="#ffd400" stroke-width="3" stroke-linecap="round">
    <line x1="89" y1="30" x2="111" y2="30"/>
    <line x1="89" y1="42" x2="111" y2="42"/>
    <line x1="89" y1="232" x2="111" y2="232"/>
    <line x1="89" y1="244" x2="111" y2="244"/>
  </g>

  <!-- crossed rackets (cross at centre, heads splay up) -->
  <use href="#rk" transform="translate(100,196) rotate(-26)"/>
  <use href="#rk" transform="translate(100,196) rotate(26)"/>
</svg>
