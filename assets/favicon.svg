<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0b0b0b"/>
  <!-- shield -->
  <ellipse cx="32" cy="33" rx="16" ry="22" fill="none" stroke="#ffd400" stroke-width="3"/>
  <!-- stick stubs -->
  <line x1="32" y1="12" x2="32" y2="20" stroke="#ffd400" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="32" y1="46" x2="32" y2="54" stroke="#ffd400" stroke-width="2.4" stroke-linecap="round"/>
  <!-- crossed rackets -->
  <g stroke="#ffd400" stroke-width="2.4" stroke-linecap="round" fill="none">
    <ellipse cx="24" cy="27" rx="5.5" ry="7"/>
    <ellipse cx="40" cy="27" rx="5.5" ry="7"/>
    <line x1="26" y1="33" x2="38" y2="46"/>
    <line x1="38" y1="33" x2="26" y2="46"/>
  </g>
</svg>
