<!DOCTYPE html><html><head><meta charset="utf-8"><title>init</title></head><body style="margin:0">
<iframe id="f" src="01-decision-making.html" width="390" height="900" style="border:0"></iframe>
<script>
var f=document.getElementById('f');
function meas(){try{var d=f.contentWindow.document,r=d.documentElement,vw=390,off=[];
d.querySelectorAll('body *').forEach(function(n){var b=n.getBoundingClientRect();
if(b.right>vw+1){off.push(n.tagName+'.'+((n.className&&n.className.toString)?n.className.toString().trim().replace(/\s+/g,'_').slice(0,20):'')+'@'+Math.round(b.right));}});
document.title='SW'+r.scrollWidth+'|N'+off.length+'|'+off.slice(0,12).join(' ');}catch(e){document.title='err:'+e;}}
f.addEventListener('load',function(){setTimeout(meas,400);});setInterval(meas,700);
</script></body></html>
